[package]
name = "s2rst"
version = "0.1.0"
edition = "2024"
license = "Apache-2.0"
description = "A Rust port of Google's S2 spherical geometry library — points, regions, shapes, and a hierarchical cell index on the sphere."
readme = "README.md"
repository = "https://github.com/torgebo/s2rst"
homepage = "https://github.com/torgebo/s2rst"
documentation = "https://docs.rs/s2rst"
authors = ["Torgeir Børresen <tb@starkad.no>"]
keywords = ["geometry", "s2", "spherical", "geospatial", "spatial-index"]
categories = ["science::geo", "mathematics", "algorithms"]
exclude = ["tests/data/", "benches/baselines/", ".cargo/"]
rust-version.workspace = true

[package.metadata.docs.rs]
all-features = true

# Disable the default libtest benchmark harness on the library target.
# libtest would otherwise claim `cargo bench` CLI args
# that Criterion tries to parse.
[lib]
bench = false

[dependencies]
num-bigint = { version = "0.4", features = [] }
num-traits = "0.2"
serde = { version = "1.0", features = ["derive"], optional = true }
geo-types = { version = "0.7", optional = true }

[dev-dependencies]
criterion = { version = "0.5", default-features = false, features = ["plotters", "cargo_bench_support"] }
iai-callgrind = "0.16.1"
quickcheck = "1.0.3"
quickcheck_macros = "1.1.0"
rand = { version = "0.8", features = ["small_rng"] }
rand_chacha = "0.3"
serde_json = "1.0"

[features]
serde = ["dep:serde", "num-bigint/serde"]
geo-types = ["dep:geo-types"]

