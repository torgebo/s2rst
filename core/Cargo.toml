# --- Wall-clock Criterion benches ---
# These mirror the iai-callgrind benches by name with a `wall_` prefix so
# `cargo bench --bench predicates` still invokes the iai-callgrind harness
# and `cargo bench --bench wall_predicates` invokes the Criterion one.
# Added progressively; start with the P0 hot paths.

[[bench]]
name = "wall_predicates"
path = "benches/wall/predicates.rs"
harness = false

[[bench]]
name = "wall_point_angle"
path = "benches/wall/point_angle.rs"
harness = false

[[bench]]
name = "wall_edge_crossing"
path = "benches/wall/edge_crossing.rs"
harness = false

[[bench]]
name = "wall_polyline"
path = "benches/wall/polyline.rs"
harness = false

[[bench]]
name = "wall_shape_index"
path = "benches/wall/shape_index.rs"
harness = false

[lints.rust]
unsafe_code = "forbid"
unsafe_op_in_unsafe_fn = "warn"
missing_docs = "warn"
missing_debug_implementations = "warn"
unreachable_pub = "warn"
single_use_lifetimes = "warn"
trivial_casts = "warn"
trivial_numeric_casts = "warn"
unused_qualifications = "warn"
unused_import_braces = "warn"
non_ascii_idents = "warn"
let_underscore_drop = "warn"
future_incompatible = { level = "warn", priority = -1 }
rust_2018_compatibility = { level = "warn", priority = -1 }
rust_2021_compatibility = { level = "warn", priority = -1 }
rust_2024_compatibility = { level = "warn", priority = -1 }


[lints.clippy]
pedantic = { level = "warn", priority = -1 }
correctness = { level = "deny", priority = -1 }
perf = { level = "warn", priority = -1 }

# Geometry library: casts between numeric types are pervasive and intentional
cast_sign_loss = "allow"
cast_possible_truncation = "allow"
cast_possible_wrap = "allow"
cast_lossless = "allow"

# Geometry library: float comparisons, precision, and many arguments are normal
float_cmp = "allow"
excessive_precision = "allow"
too_many_arguments = "allow"

# Geometry code uses short variable names (a, b, c, p0, p1, ...)
similar_names = "allow"
many_single_char_names = "allow"

# Too noisy / not appropriate yet
must_use_candidate = "allow"
return_self_not_must_use = "allow"
missing_errors_doc = "warn"
missing_panics_doc = "warn"
doc_markdown = "warn"
unreadable_literal = "allow"
module_name_repetitions = "allow"
items_after_statements = "allow"
bool_to_int_with_if = "allow"
needless_pass_by_value = "allow"
type_complexity = "allow"
too_many_lines = "allow"
cast_precision_loss = "allow"
missing_fields_in_debug = "allow"
unnecessary_wraps = "allow"
iter_not_returning_iterator = "allow"
struct_field_names = "allow"


undocumented_unsafe_blocks = "warn"
multiple_unsafe_ops_per_block = "warn"
as_underscore = "warn"
ptr_as_ptr = "warn"

missing_safety_doc = "warn"
dbg_macro = "warn"
print_stdout = "warn"
print_stderr = "warn"
allow_attributes = "warn"
allow_attributes_without_reason = "warn"
clone_on_ref_ptr = "warn"
create_dir = "warn"
exit = "warn"
wildcard_enum_match_arm = "warn"
unused_result_ok = "warn"

